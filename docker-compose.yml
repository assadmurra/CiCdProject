services:
  db:
    image: mysql:8.0
    container_name: hotel-db
    restart: always
    environment:
      # إذا لم تحدد كلمة سر في النظام، سيستخدم 'root'
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: super_awesome_team_db
    ports:
      - "3307:3306"
    healthcheck:
      # لاحظ أننا استخدمنا كلمة root هنا أيضاً في الفحص
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      timeout: 5s
      interval: 10s
      retries: 10

  app:
    build: .
    container_name: hotel-app
    ports:
      - "8080:8080"
    environment:
      - MYSQL_HOST=db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=${JWT_SECRET:-MySuperSafeSecretKey123456789}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-zoeylhrdnismoikn}
     
    depends_on:
      db:
        condition: service_healthy